<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Shehzadi ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
font-family:Arial,sans-serif;
overflow:hidden;
}

.container{
text-align:center;
padding:20px;
}

h1{
font-size:32px;
color:#fff;
}

p{
color:white;
font-size:18px;
}

.buttons{
margin-top:30px;
position:relative;
height:150px;
}

button{
border:none;
padding:15px 30px;
font-size:20px;
border-radius:50px;
cursor:pointer;
transition:0.3s;
}

#yesBtn{
background:#28a745;
color:white;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
left:60%;
top:0;
}

</style>
</head>

<body>

<div class="container">

<h1>🥺 Dear Shehzadi ❤️</h1>
<p> Don't dare to click "No"</p>
<h2>Will you stay with me forever and never let anyone come into our life?? Will you accept me in front of your family when I'll come to ask for your hand???💖</h2>

<div class="buttons">

<button id="yesBtn">Yes 💖</button>

<button id="noBtn">No 😭</button>

</div>

</div>

<script>

let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");

let size = 20;

noBtn.addEventListener("click",()=>{

let x = Math.random()*(window.innerWidth-120);
let y = Math.random()*(window.innerHeight-80);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

size += 8;
yesBtn.style.fontSize=size+"px";
yesBtn.style.padding=(size/2)+"px "+(size)+"px";

});

yesBtn.addEventListener("click",()=>{

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
text-align:center;
">

<h1 style="font-size:50px;">❤️Lobb Juuu❤️</h1>

<h2>Yay! I knew you'd say yes 💍</h2>

<p>Thanks a Lottttt 😭💖</p>

</div>

`;

});

</script>

</body>
</html>
